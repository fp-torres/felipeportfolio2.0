name: Deploy Automático Hostinger

on:
  push:
    branches:
      - main # O deploy só acontece quando envia para a main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Obter código mais recente
      uses: actions/checkout@v4
    
    - name: ⚙️ Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalar Dependências
      run: npm install

    - name: 🛠️ Buildar o Projeto (Vite)
      run: npm run build

    - name: 🚀 Sincronizar arquivos para a Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/ 
        server-dir: ./